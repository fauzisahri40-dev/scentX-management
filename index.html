    <style>
        *{margin:0;padding:0;box-sizing:border-box}html,body{height:100%;width:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#1a1a1a}.splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);display:flex;justify-content:center;align-items:center;z-index:9999;animation:splash-out 0.8s ease-in 2.2s forwards}.splash.hidden{display:none!important}@keyframes splash-out{from{opacity:1}to{opacity:0;visibility:hidden}}.splash-main{position:relative;z-index:10;text-align:center}.logo-section{position:relative;width:160px;height:160px;margin:0 auto 40px;display:flex;align-items:center;justify-content:center}.logo-glow{position:absolute;width:190px;height:190px;background:radial-gradient(circle,rgba(255,215,0,0.4) 0%,transparent 70%);border-radius:50%;animation:glow-pulse 2.5s ease-in-out infinite}@keyframes glow-pulse{0%,100%{transform:scale(0.9);opacity:0.2}50%{transform:scale(1.2);opacity:0.5}}.logo-box{width:150px;height:150px;background:white;border-radius:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 25px 75px rgba(0,0,0,0.6);position:relative;z-index:5;padding:8px;overflow:hidden}.logo-img{width:100%;height:100%;object-fit:contain;display:block}.splash-text{margin-bottom:30px}.splash-text h2{font-size:26px;font-weight:800;color:white;margin-bottom:10px;text-shadow:0 2px 10px rgba(0,0,0,0.5)}.splash-text p{font-size:12px;color:#ffd700;font-weight:700;letter-spacing:2px;text-transform:uppercase}.loading-section{width:240px;margin:0 auto}.progress-bar{width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin-bottom:12px}.progress-fill{height:100%;background:linear-gradient(90deg,#ffd700,#ffed4e,#ffd700);width:0%;animation:fill 2.5s cubic-bezier(0.25,0.46,0.45,0.94) forwards}@keyframes fill{0%{width:0%}100%{width:100%}}.app{display:none;flex-direction:column;height:100vh;background:white}.app.show{display:flex}header{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);color:white;padding:12px 16px;text-align:center;flex-shrink:0;box-shadow:0 4px 15px rgba(0,0,0,0.2)}header h1{font-size:20px;font-weight:700;margin-bottom:4px}header p{font-size:11px;opacity:0.85;margin-bottom:10px}.header-controls{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap;font-size:12px}.status{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);padding:6px 14px;border-radius:20px;border:1px solid rgba(255,215,0,0.2)}.status-dot{width:8px;height:8px;border-radius:50%;background:#4CAF50;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}.tabs{display:flex;background:white;border-bottom:2px solid #e9ecef;padding:0 10px;overflow-x:auto;flex-shrink:0}.tab{padding:12px 14px;border:none;background:none;cursor:pointer;font-weight:600;font-size:12px;color:#666;border-bottom:3px solid transparent;white-space:nowrap}.tab.active{color:#1a1a1a;border-bottom-color:#ffd700}.content-area{flex:1;overflow-y:auto}.content{display:none;padding:15px}.content.active{display:block}.card{background:#f8f9fa;border-radius:10px;padding:15px;border:2px solid #e9ecef;margin-bottom:15px}.card h2{color:#1a1a1a;margin-bottom:15px;font-size:16px}.form-group{margin-bottom:12px}label{display:block;font-weight:600;margin-bottom:5px;color:#1a1a1a;font-size:13px}input,select,textarea{width:100%;padding:10px;border:2px solid #e9ecef;border-radius:6px;font-size:14px}input:focus,select:focus,textarea:focus{outline:none;border-color:#ffd700;box-shadow:0 0 0 3px rgba(255,215,0,0.1)}button{padding:10px 16px;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}.btn-primary{background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 100%);color:white;width:100%}.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:15px}.stat-card{background:white;padding:15px;border-radius:8px;border-left:4px solid #1a1a1a}.stat-label{font-size:11px;color:#999;margin-bottom:8px;font-weight:600}.stat-value{font-size:18px;font-weight:bold;color:#1a1a1a}.product-item{background:white;padding:12px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border-left:4px solid #ffd700}.product-name{font-weight:bold;color:#1a1a1a;margin-bottom:4px}.product-stock{background:#1a1a1a;color:white;padding:8px 12px;border-radius:5px;font-weight:bold;margin-left:10px}.commission-row{background:white;padding:12px;border-radius:8px;margin-bottom:10px;border-left:4px solid #ffd700}.commission-header{font-weight:bold;color:#1a1a1a;margin-bottom:8px;font-size:14px}

            <div class="content active" id="input"><div class="card"><h2>📝 Input Penjualan</h2><div class="form-group"><label>Tanggal</label><input type="date" id="inputDate"></div><div class="form-group"><label>Nama Sales</label><input type="text" id="inputSales" placeholder="Nama sales"></div><div class="form-group"><label>Total Penjualan (Rp)</label><input type="number" id="inputAmount" placeholder="0"></div><div class="form-group"><label>Produk (Nama:Qty)</label><textarea id="inputProducts" placeholder="Contoh: Perfume A:2, Perfume B:3" rows="3"></textarea></div><button class="btn-primary" onclick="saveSale()">💾 Simpan</button></div></div>
            <div class="content" id="dashboard"><div class="card"><h2>📈 Dashboard</h2><div class="stat-grid"><div class="stat-card"><div class="stat-label">Total Penjualan</div><div class="stat-value" id="totalSales">Rp 0</div></div><div class="stat-card"><div class="stat-label">Total Komisi</div><div class="stat-value" id="totalCommission">Rp 0</div></div><div class="stat-card"><div class="stat-label">Total Produk</div><div class="stat-value" id="totalProducts">0</div></div></div></div></div>
            <div class="content" id="stok"><div class="card"><h2>📦 Management Stok</h2><div id="productList"></div><h3>Tambah Produk</h3><div class="form-group"><label>Nama Produk</label><input type="text" id="newProductName"></div><div class="form-group"><label>Stok</label><input type="number" id="newProductStock" value="0"></div><div class="form-group"><label>Harga (Rp)</label><input type="number" id="newProductPrice" value="0"></div><button class="btn-primary" onclick="addProduct()">➕ Tambah</button></div></div>
            <div class="content" id="komisi"><div class="card"><h2>💰 Komisi Sales</h2><p style="font-size:12px;color:#666;margin-bottom:15px">Komisi: Rp 5.000 per produk</p><div id="commissionList"></div></div></div>
            <div class="content" id="history"><div class="card"><h2>📋 History</h2><div id="historyList"></div></div></div>
            <div class="content" id="backup"><div class="card"><h2>☁️ Backup</h2><button class="btn-primary" onclick="downloadBackup()" style="margin-bottom:10px">⬇️ Download</button></div></div>
        </div>
    </div>

    <script>
        let sales = JSON.parse(localStorage.getItem('scent_sales')) || [];
        let products = JSON.parse(localStorage.getItem('scent_products')) || [];

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('app').classList.add('show');
                document.getElementById('inputDate').valueAsDate = new Date();
                refreshAll();
            }, 2200);

            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('data:text/javascript;base64,CnNlbGYuYWRkRXZlbnRMaXN0ZW5lcignZmV0Y2gnLCAoKSA9PiB7fSk7');
            }
        });

        function switchTab(e, tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
            document.getElementById(tab).classList.add('active');
        }

        function saveSale() {
            const date = document.getElementById('inputDate').value;
            const salesName = document.getElementById('inputSales').value;
            const amount = parseInt(document.getElementById('inputAmount').value) || 0;
            if (!salesName || !amount) { alert('Semua field harus diisi!'); return; }
            sales.push({date, salesName, amount, id: Date.now()});
            localStorage.setItem('scent_sales', JSON.stringify(sales));
            alert('✅ Penjualan disimpan!');
            refreshAll();
        }

        function addProduct() {
            const name = document.getElementById('newProductName').value;
            const stock = parseInt(document.getElementById('newProductStock').value) || 0;
            const price = parseInt(document.getElementById('newProductPrice').value) || 0;
            if (!name) { alert('Nama produk harus diisi!'); return; }
            products.push({name, stock, price, id: Date.now()});
            localStorage.setItem('scent_products', JSON.stringify(products));
            document.getElementById('newProductName').value = '';
            refreshAll();
        }

        function refreshDashboard() {
            const totalSales = sales.reduce((sum, s) => sum + s.amount, 0);
            const totalCommission = sales.length * 5000;
            document.getElementById('totalSales').textContent = `Rp ${totalSales.toLocaleString('id-ID')}`;
            document.getElementById('totalCommission').textContent = `Rp ${totalCommission.toLocaleString('id-ID')}`;
            document.getElementById('totalProducts').textContent = sales.length;
        }

        function refreshStok() {
            const list = document.getElementById('productList');
            list.innerHTML = products.map(p => `<div class="product-item"><div class="product-name">${p.name}</div><div class="product-stock">${p.stock} unit</div></div>`).join('');
        }

        function refreshKomisi() {
            const commissionByPerson = {};
            sales.forEach(s => {
                if (!commissionByPerson[s.salesName]) {
                    commissionByPerson[s.salesName] = {totalCommission: 0, count: 0};
                }
                commissionByPerson[s.salesName].count++;
                commissionByPerson[s.salesName].totalCommission += s.amount * 0.1;
            });
            const list = document.getElementById('commissionList');
            list.innerHTML = Object.entries(commissionByPerson).map(([name, data]) => `<div class="commission-row"><div class="commission-header">${name}</div><div style="font-size:12px;color:#666">Transaksi: ${data.count}</div><div style="font-size:12px;color:#1a1a1a;font-weight:bold">Komisi: Rp ${data.totalCommission.toLocaleString('id-ID')}</div></div>`).join('');
        }

        function refreshHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = [...sales].reverse().map(s => `<div class="commission-row"><div class="commission-header">${s.date} - ${s.salesName}</div><div style="font-size:12px;color:#666">Rp ${s.amount.toLocaleString('id-ID')}</div></div>`).join('');
        }

        function refreshAll() {
            refreshDashboard();
            refreshStok();
            refreshKomisi();
            refreshHistory();
        }

        function downloadBackup() {
            const data = {sales, products, date: new Date().toISOString()};
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `scent-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }
    </script>
</body>
</html>
